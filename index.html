<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Booth - Study Timer</title>
    <style>
        :root {
            --booth-panel: rgba(30, 30, 38, 0.75); 
            --accent-wood: #c19a6b; 
            --text-main: #f5f5f7;
            --text-muted: #c1c1cb;
            --shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
        }

        body {
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('kobetu.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* すりガラス風の個別ブースコンテナ */
        .booth-container {
            background: var(--booth-panel);
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            width: 100%;
            max-width: 460px;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .booth-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 10%;
            width: 80%;
            height: 3px;
            background: var(--accent-wood);
            border-radius: 0 0 4px 4px;
        }

        /* もどるボタンのスタイル */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 25px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s ease;
            letter-spacing: 0.05em;
        }

        .back-btn:hover {
            color: var(--accent-wood);
        }

        h1 {
            text-align: center;
            font-size: 1.4rem;
            font-weight: 400;
            letter-spacing: 0.2em;
            color: var(--accent-wood);
            margin-top: 10px; /* ボタンとのバランス調整 */
            margin-bottom: 30px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* モード切り替えタブ */
        .tabs {
            display: flex;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.4);
            padding: 5px;
            border-radius: 10px;
            margin-bottom: 35px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 12px 5px;
            font-size: 0.85rem;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: var(--accent-wood);
            color: #1e1e24;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(193, 154, 107, 0.3);
        }

        /* タイマー表示エリア */
        .display-section {
            text-align: center;
            margin-bottom: 35px;
        }

        .status-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            letter-spacing: 0.15em;
            margin-bottom: 10px;
            height: 20px;
            text-transform: uppercase;
        }

        .timer-display {
            font-size: 4.8rem;
            font-weight: 200; 
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.02em;
            margin-bottom: 15px;
            text-shadow: 0 4px 12px rgba(0,0,0,0.4);
        }

        /* カスタム入力エリア */
        .custom-inputs {
            display: none;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .custom-inputs input {
            width: 80px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(193, 154, 107, 0.4);
            border-radius: 8px;
            color: var(--text-main);
            padding: 10px;
            text-align: center;
            font-size: 1.2rem;
        }

        .custom-inputs input:focus {
            outline: none;
            border-color: var(--accent-wood);
            box-shadow: 0 0 8px rgba(193, 154, 107, 0.4);
        }

        /* コントロールボタン */
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 35px;
        }

        .btn {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255,255,255,0.2);
            color: var(--text-main);
            padding: 14px 30px;
            font-size: 0.95rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 120px;
            letter-spacing: 0.05em;
            backdrop-filter: blur(4px);
        }

        .btn-start {
            background: transparent;
            border-color: var(--accent-wood);
            color: var(--accent-wood);
        }

        .btn-start:hover {
            background: var(--accent-wood);
            color: #1e1e24;
            box-shadow: 0 4px 15px rgba(193, 154, 107, 0.4);
        }

        .btn-pause {
            border-color: #f59e0b;
            color: #f59e0b;
        }

        .btn-pause:hover {
            background: #f59e0b;
            color: #1e1e24;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);
        }

        .btn:hover:not(.btn-start):not(.btn-pause) {
            background: rgba(255,255,255,0.1);
            border-color: var(--text-main);
        }

        /* ログセクション */
        .log-section {
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 25px;
        }

        .log-title {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 15px;
            letter-spacing: 0.1em;
        }

        .log-list {
            list-style: none;
            max-height: 140px;
            overflow-y: auto;
        }

        .log-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            color: var(--text-muted);
        }

        .log-item span:last-child {
            color: var(--accent-wood);
            font-weight: bold;
        }

        /* スクロールバーのカスタム */
        .log-list::-webkit-scrollbar {
            width: 4px;
        }
        .log-list::-webkit-scrollbar-thumb {
            background: rgba(193, 154, 107, 0.4);
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="booth-container">
    <!-- もどるボタン (JavaScriptで直前の履歴に戻る) -->
    <button class="back-btn" onclick="goBack()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        もどる
    </button>

    <h1>STUDY BOOTH</h1>

    <!-- モード切り替えタブ -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchMode('pomodoro')">ポモドーロ</button>
        <button class="tab-btn" onclick="switchMode('stopwatch')">ストップウォッチ</button>
        <button class="tab-btn" onclick="switchMode('custom')">カスタム</button>
    </div>

    <!-- タイマー本体 -->
    <div class="display-section">
        <div class="status-label" id="status-label">FOCUS (25m)</div>
        <div class="timer-display" id="timer-display">25:00</div>
        
        <!-- カスタムモード用入力欄 -->
        <div class="custom-inputs" id="custom-inputs">
            <input type="number" id="custom-min" min="1" max="180" value="45">
            <span style="align-self: center; color: var(--text-muted); font-size: 0.9rem;">分に設定</span>
        </div>
    </div>

    <!-- 操作ボタン -->
    <div class="controls">
        <button class="btn btn-start" id="start-btn" onclick="startTimer()">START</button>
        <button class="btn" id="reset-btn" onclick="resetTimer()">RESET</button>
    </div>

    <!-- 記録ログ -->
    <div class="log-section">
        <div class="log-title">STUDY LOG</div>
        <ul class="log-list" id="log-list">
            <!-- ここに記録が追加されます -->
        </ul>
    </div>
</div>

<script>
    let currentMode = 'pomodoro'; 
    let timerState = 'paused'; 
    let timerInterval = null;
    
    let totalSeconds = 25 * 60; 
    let initialTotalSeconds = 25 * 60; 
    let stopwatchSeconds = 0;
    let isBreak = false;

    const display = document.getElementById('timer-display');
    const statusLabel = document.getElementById('status-label');
    const startBtn = document.getElementById('start-btn');
    const customInputs = document.getElementById('custom-inputs');
    const logList = document.getElementById('log-list');

    // 前のページに戻る関数
    function goBack() {
        if (document.referrer) {
            window.history.back();
        } else {
            alert('前の履歴がありません。');
        }
    }

    function switchMode(mode) {
        clearInterval(timerInterval);
        timerState = 'paused';
        startBtn.textContent = 'START';
        startBtn.className = 'btn btn-start';
        currentMode = mode;

        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        if(event) event.target.classList.add('active');

        customInputs.style.display = 'none';
        display.style.display = 'block';

        if (mode === 'pomodoro') {
            isBreak = false;
            totalSeconds = 25 * 60;
            initialTotalSeconds = totalSeconds;
            statusLabel.textContent = 'FOCUS (25m)';
            updateDisplay(totalSeconds);
        } else if (mode === 'stopwatch') {
            stopwatchSeconds = 0;
            statusLabel.textContent = 'MEASURING';
            updateDisplay(0);
        } else if (mode === 'custom') {
            customInputs.style.display = 'flex';
            statusLabel.textContent = 'SET TIME';
            setCustomTime();
        }
    }

    document.getElementById('custom-min').addEventListener('input', setCustomTime);

    function setCustomTime() {
        if (currentMode !== 'custom') return;
        const min = parseInt(document.getElementById('custom-min').value) || 0;
        totalSeconds = min * 60;
        initialTotalSeconds = totalSeconds;
        updateDisplay(totalSeconds);
    }

    function updateDisplay(secs) {
        const m = Math.floor(secs / 60).toString().padStart(2, '0');
        const s = (secs % 60).toString().padStart(2, '0');
        display.textContent = `${m}:${s}`;
    }

    function startTimer() {
        if (timerState === 'paused') {
            timerState = 'running';
            startBtn.textContent = 'PAUSE';
            startBtn.className = 'btn btn-pause';

            if (currentMode === 'custom') {
                customInputs.style.display = 'none';
            }

            if (currentMode === 'stopwatch') {
                timerInterval = setInterval(() => {
                    stopwatchSeconds++;
                    updateDisplay(stopwatchSeconds);
                }, 1000);
            } else {
                timerInterval = setInterval(() => {
                    if (totalSeconds > 0) {
                        totalSeconds--;
                        updateDisplay(totalSeconds);
                    } else {
                        timerFinished();
                    }
                }, 1000);
            }
        } else {
            clearInterval(timerInterval);
            timerState = 'paused';
            startBtn.textContent = 'START';
            startBtn.className = 'btn btn-start';
        }
    }

    function timerFinished() {
        clearInterval(timerInterval);
        timerState = 'paused';
        startBtn.textContent = 'START';
        startBtn.className = 'btn btn-start';

        if (currentMode === 'pomodoro') {
            if (!isBreak) {
                addLog('ポモドーロ: 集中終了', '25:00');
                alert('集中時間が終了しました！休憩に入りましょう。');
                isBreak = true;
                statusLabel.textContent = 'BREAK (5m)';
                totalSeconds = 5 * 60;
                initialTotalSeconds = totalSeconds;
                updateDisplay(totalSeconds);
                startTimer(); 
            } else {
                addLog('ポモドーロ: 休憩終了', '05:00');
                alert('休憩が終了しました！次のサイクルを始めましょう。');
                isBreak = false;
                statusLabel.textContent = 'FOCUS (25m)';
                totalSeconds = 25 * 60;
                initialTotalSeconds = totalSeconds;
                updateDisplay(totalSeconds);
            }
        } else if (currentMode === 'custom') {
            const min = Math.floor(initialTotalSeconds / 60);
            addLog('カスタムタイマー', `${min}:00`);
            alert('設定した時間が経過しました！');
            resetTimer();
        }
    }

    function resetTimer() {
        clearInterval(timerInterval);
        timerState = 'paused';
        startBtn.textContent = 'START';
        startBtn.className = 'btn btn-start';

        if (currentMode === 'stopwatch') {
            if (stopwatchSeconds > 0) {
                const m = Math.floor(stopwatchSeconds / 60).toString().padStart(2, '0');
                const s = (stopwatchSeconds % 60).toString().padStart(2, '0');
                addLog('ストップウォッチ', `${m}:${s}`);
            }
            stopwatchSeconds = 0;
            updateDisplay(0);
        } else {
            if (currentMode === 'custom') {
                customInputs.style.display = 'flex';
            }
            totalSeconds = initialTotalSeconds;
            updateDisplay(totalSeconds);
        }
    }

    function addLog(type, duration) {
        const now = new Date();
        const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
        
        const li = document.createElement('li');
        li.className = 'log-item';
        li.innerHTML = `<span>[${timeStr}] ${type}</span> <span>+ ${duration}</span>`;
        
        logList.insertBefore(li, logList.firstChild);
    }
</script>
</body>
</html>
